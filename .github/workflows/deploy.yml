name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.11

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Typecheck workspace
        run: bun run typecheck

      - name: Typecheck transcriber
        run: bun run --cwd services/transcriber typecheck

  deploy-cloudflare:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.11

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Build UI
        working-directory: ui
        env:
          VITE_API_BASE_URL: https://api.podads.yet-to-be.com
          VITE_PUBLIC_POSTHOG_KEY: ${{ secrets.VITE_PUBLIC_POSTHOG_KEY }}
          VITE_PUBLIC_POSTHOG_HOST: ${{ secrets.VITE_PUBLIC_POSTHOG_HOST }}
        run: bun run build

      - name: Deploy UI to Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler pages deploy ui/dist --project-name podads-ui

      - name: Deploy API Worker
        uses: cloudflare/wrangler-action@v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/api
          command: deploy

      - name: Deploy Processor Worker with Discord webhook
        uses: cloudflare/wrangler-action@v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/processor
          command: deploy
          secrets: |
            DISCORD_PROCESSING_FAILURE_WEBHOOK_URL
        env:
          DISCORD_PROCESSING_FAILURE_WEBHOOK_URL: ${{ secrets.DISCORD_PROCESSING_FAILURE_WEBHOOK_URL }}

  check-railway-changes:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.transcriber }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            transcriber:
              - 'services/transcriber/**'
              - 'packages/shared/**'
              - '.github/workflows/deploy.yml'
              - 'package.json'
              - 'bun.lock'

  deploy-railway:
    runs-on: ubuntu-latest
    needs: [validate, check-railway-changes]
    if: github.event_name == 'workflow_dispatch' || needs.check-railway-changes.outputs.changed == 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: 1.3.11

      - name: Deploy transcriber service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: bunx @railway/cli up -s be92fc36-7b06-4b34-bc37-7f696f21514c --ci
